<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vocab Drill | Proctored Assessment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c15;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #11131f;
            border-radius: 32px;
            padding: 24px 28px;
            border: 1px solid #252a41;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6);
        }

        h1, h2, h3 {
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2rem;
        }

        .timer-panel {
            background: #0b0d16;
            padding: 12px 24px;
            border-radius: 60px;
            display: inline-flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            border-left: 5px solid #facc15;
            font-weight: 600;
        }

        .timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: #facc15;
            background: #00000030;
            padding: 0 12px;
            border-radius: 40px;
        }

        .card {
            background: #151b2b;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid #2d3450;
        }

        label {
            font-weight: 500;
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            color: #b9c3e0;
        }

        input, select {
            background: #0a0e1a;
            border: 1px solid #2f3a5c;
            padding: 12px 16px;
            border-radius: 20px;
            width: 100%;
            color: #f1f5f9;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129,140,248,0.3);
        }

        button {
            background: #2d3a5e;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            margin-right: 12px;
        }

        button.primary {
            background: #4f46e5;
            box-shadow: 0 4px 14px rgba(79,70,229,0.4);
        }

        button.primary:hover {
            background: #6366f1;
            transform: scale(0.98);
        }

        button.danger {
            background: #dc2626;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .vocab-item {
            background: #1a1f33;
            padding: 12px 16px;
            border-radius: 20px;
            border-left: 4px solid #818cf8;
        }

        .vocab-word {
            font-weight: 700;
            font-size: 1.1rem;
            color: #facc15;
        }

        .question-card {
            background: #13182a;
            padding: 18px;
            border-radius: 24px;
            margin-bottom: 16px;
            border: 1px solid #293054;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 8px;
        }

        .option label {
            margin: 0;
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .wordbank-box {
            background: #0c1020;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #2d3a66;
        }

        .wordbank-word {
            background: #1e2a4a;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .popup-card {
            background: #1a1f2e;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            border-radius: 36px;
            box-shadow: 0 25px 40px black;
        }

        .hidden {
            display: none;
        }

        .answer-summary {
            background: #0e1222;
            padding: 16px;
            border-radius: 24px;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .no-print, .timer-panel, button, .popup, #summaryPopup {
                display: none !important;
            }
            .print-pattern {
                background: repeating-linear-gradient(45deg, #f0f2f5 0px, #f0f2f5 3px, #ffffff 3px, #ffffff 15px);
                padding: 20px;
            }
            .container {
                background: white;
                color: black;
                box-shadow: none;
            }
            .answer-summary {
                background: #f8f9fc;
                border: 1px solid #ccc;
                color: black;
            }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 25px;
            color: #5a668a;
        }
        hr {
            border-color: #2a3250;
        }
        .section-title {
            margin: 20px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #4f46e5;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container" id="appRoot">
    <!-- LOGIN PAGE -->
    <div id="loginPage">
        <div class="card" style="max-width: 550px; margin: 40px auto;">
            <h1 class="gradient-text">📘 VOCAB DRILL</h1>
            <p style="margin: 8px 0 20px 0;">Proctored vocabulary assessment system</p>
            <label>Student Name</label>
            <input type="text" id="studentName" placeholder="e.g., Ahmad Fauzi">
            <label>Student ID</label>
            <input type="text" id="studentId" placeholder="e.g., 22051234">
            <label>Study Program</label>
            <input type="text" id="studyProgram" placeholder="e.g., English Literature">
            <label>Select Day</label>
            <select id="daySelect">
                <option value="day1">Day 1 (Vocabulary 1-100)</option>
                <option value="day2">Day 2 (Vocabulary 101-200)</option>
                <option value="day3">Day 3 (Vocabulary 201-300)</option>
            </select>
            <button class="primary" id="startBtn" style="width: 100%; margin-top: 28px;">▶ Begin Session</button>
        </div>
    </div>

    <!-- VOCAB LIST PAGE (5 min timer) -->
    <div id="vocabListPage" class="hidden">
        <div class="timer-panel no-print">
            <span>📖 Review mode:</span>

            <span>time left</span>

        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h2>📚 Vocabulary List: <span id="listDayLabel"></span></h2>
            <button id="proceedToDrillBtn" class="primary">➡ Proceed to Drill</button>
        </div>
        <div class="vocab-grid" id="vocabListContainer"></div>
    </div>

    <!-- DRILL PAGE (25 min timer) -->
    <div id="drillPage" class="hidden">
        <div class="timer-panel no-print">
            <span>✍️ Drill in progress:</span>
            <span class="timer" id="drillTimer">25:00</span>
            <span>auto-submit at 0</span>
        </div>
        <div id="drillQuestionsContainer"></div>
        <div style="margin: 20px 0;">
            <button id="submitDrillBtn" class="primary">✅ Submit Exam & Show Summary</button>
        </div>
    </div>

    <!-- SUMMARY + PRINT POPUP -->
    <div id="summaryPopup" class="popup hidden">
        <div class="popup-card">
            <h3>📄 Submission Summary</h3>
            <div id="summaryContent" class="answer-summary"></div>
            <div style="margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
                <button id="closeSummaryBtn" class="danger">Close</button>
                <button id="printSummaryBtn" class="primary">🖨️ Print / Save as PDF</button>
            </div>
        </div>
    </div>
</div>

    // Global state
    let currentDay = 'day1';
    let student = { name: '', id: '', program: '' };
    let listTimerInterval = null, drillTimerInterval = null;
    let listTime = 300;
    let drillTime = 1500;
    let drillActive = false;
    let submitted = false;
    let tabViolations = 0;
    let selectedAnswers = {};

    const loginDiv = document.getElementById('loginPage');
    const listDiv = document.getElementById('vocabListPage');
    const drillDiv = document.getElementById('drillPage');
    const summaryPopup = document.getElementById('summaryPopup');

    function clearAllTimers() {
        if (listTimerInterval) clearInterval(listTimerInterval);
        if (drillTimerInterval) clearInterval(drillTimerInterval);
    }

    // Anti-cheat system
    function initAntiCheat() {
        window.addEventListener('blur', () => { if (drillActive && !submitted) handleViolation(); });
        document.addEventListener('visibilitychange', () => { if (document.hidden && drillActive && !submitted) handleViolation(); });
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (drillActive && !submitted && (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's')))) {
                e.preventDefault();
                alert("⚠️ Screenshot/print actions are disabled during the drill.");
            }
        });
        // Disable split screen detection via resize (warning only)
        let resizeCount = 0;
        window.addEventListener('resize', () => {
            if (drillActive && !submitted && window.innerWidth < 800) {
                resizeCount++;
                if (resizeCount === 1) alert("⚠️ Please maintain full window for the exam.");
                else if (resizeCount >= 2) handleViolation();
            }
        });
    }

    function handleViolation() {
        tabViolations++;
        if (tabViolations === 1) alert("⚠️ WARNING: Leaving the drill page is prohibited. Next violation will auto-submit.");
        else if (tabViolations >= 2) {
            alert("❌ FORCE SUBMISSION: You violated the policy. Test is auto-submitted.");
            forceSubmitDrill();
        }
    }

    function forceSubmitDrill() {
        if (submitted) return;
        if (drillTimerInterval) clearInterval(drillTimerInterval);
        submitted = true;
        drillActive = false;
        gatherAndShowSummary();
    }

    document.getElementById('startBtn').addEventListener('click', () => {
        const name = document.getElementById('studentName').value.trim();
        const id = document.getElementById('studentId').value.trim();
        const prog = document.getElementById('studyProgram').value.trim();
        if (!name || !id || !prog) { alert("Please fill all fields."); return; }
        student = { name, id, program: prog };
        currentDay = document.getElementById('daySelect').value;
        loginDiv.classList.add('hidden');
        listDiv.classList.remove('hidden');
        renderVocabList();
        startListTimer();
    });

    function renderVocabList() {
        const vocab = getVocabByDay(currentDay);
        const container = document.getElementById('vocabListContainer');
        container.innerHTML = '';
        document.getElementById('listDayLabel').innerText = currentDay.toUpperCase();
        vocab.forEach(v => {
            const div = document.createElement('div'); div.className = 'vocab-item';
            div.innerHTML = `<div class="vocab-word">${v.word}</div><div>📖 ${v.eng} &nbsp;—&nbsp; 🇮🇩 ${v.ind}</div>`;
            container.appendChild(div);
        });
    }

    function startListTimer() {
        if (listTimerInterval) clearInterval(listTimerInterval);
        listTimerInterval = setInterval(() => {
            if (listTime <= 0) {
                clearInterval(listTimerInterval);
                alert("Time for vocabulary review finished! Moving to drill.");
                proceedToDrill();
            } else {
                listTime--;
                let mins = Math.floor(listTime / 60);
                let secs = listTime % 60;
                document.getElementById('listTimer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }

    document.getElementById('proceedToDrillBtn').addEventListener('click', () => {
        if (listTimerInterval) clearInterval(listTimerInterval);
        proceedToDrill();
    });

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function proceedToDrill() {
        listDiv.classList.add('hidden');
        drillDiv.classList.remove('hidden');
        buildDrillQuestions();
        startDrillTimer();
        drillActive = true;
        submitted = false;
        tabViolations = 0;
    }

    function buildDrillQuestions() {
        const dayData = practiceQuestions[currentDay];
        if (!dayData) return;
        
        // Shuffle Part A (1-25) and Part B (26-40)
        const shuffledPartA = shuffleArray([...dayData.partA]);
        const shuffledPartB = shuffleArray([...dayData.partB]);
        const wordBankList = shuffleArray([...dayData.wordBank]);
        
        const container = document.getElementById('drillQuestionsContainer');
        container.innerHTML = '';
        selectedAnswers = {};
        
        // Section title
        const titleA = document.createElement('h3'); titleA.className = 'section-title'; titleA.innerText = 'Part A: Fill in the blanks (Questions 1-25)';
        container.appendChild(titleA);
        
        // Part A: Questions 1-25
        shuffledPartA.forEach((q, idx) => {
            const qDiv = document.createElement('div'); qDiv.className = 'question-card';
            qDiv.innerHTML = `
                <div class="question-text">${idx + 1}. ${q.text}</div>
                <div class="options">
                    ${q.options.map((opt, optIdx) => `<div class="option"><label><input type="radio" name="q_partA_${idx}" value="${opt}"> ${opt}</label></div>`).join('')}
                </div>`;
            container.appendChild(qDiv);
            const radios = qDiv.querySelectorAll('input');
            radios.forEach(radio => radio.addEventListener('change', (e) => {
                selectedAnswers[`partA_${idx}`] = e.target.value;
            }));
        });
        
        // Section title Part B
        const titleB = document.createElement('h3'); titleB.className = 'section-title'; titleB.innerText = 'Part B: Choose the correct definition (Questions 26-40)';
        container.appendChild(titleB);
        
        // Part B: Questions 26-40
        shuffledPartB.forEach((q, idx) => {
            const qDiv = document.createElement('div'); qDiv.className = 'question-card';
            qDiv.innerHTML = `
                <div class="question-text">${26 + idx}. ${q.text}</div>
                <div class="options">
                    ${q.options.map((opt, optIdx) => `<div class="option"><label><input type="radio" name="q_partB_${idx}" value="${opt}"> ${opt}</label></div>`).join('')}
                </div>`;
            container.appendChild(qDiv);
            const radios = qDiv.querySelectorAll('input');
            radios.forEach(radio => radio.addEventListener('change', (e) => {
                selectedAnswers[`partB_${idx}`] = e.target.value;
            }));
        });
        
        // Word Bank display for Part C
        const bankDiv = document.createElement('div'); bankDiv.className = 'wordbank-box';
        bankDiv.innerHTML = `<strong>📦 WORD BANK (For questions 41-50):</strong><br/>` + wordBankList.map(w => `<span class="wordbank-word">${w}</span>`).join('');
        container.appendChild(bankDiv);
        
        // Section title Part C
        const titleC = document.createElement('h3'); titleC.className = 'section-title'; titleC.innerText = 'Part C: Fill in the blanks using the Word Bank (Questions 41-50)';
        container.appendChild(titleC);
        
        // Part C sentences (universal but students must pick from word bank)
        const partCSentences = [
            "Good study habits can help students overcome _________.",
            "The company wants to _________ more customers online.",
            "The school principal works as the chief _________.",
            "We need _________ information before making a decision.",
            "Her graduation was a major _________.",
            "The team must _________ quickly to the new regulations.",
            "The scholarship gave her an _________ over other applicants.",
            "The climbers went on an exciting _________ in the mountains.",
            "The university announced that _________ applications are now open.",
            "Repeated practice improves the _________ of your work."
        ];
        
        // Shuffle the sentences order
        const shuffledSentences = shuffleArray([...partCSentences]);
        
        shuffledSentences.forEach((sentence, idx) => {
            const fbDiv = document.createElement('div'); fbDiv.className = 'question-card';
            fbDiv.innerHTML = `
                <div class="question-text">${41 + idx}. ${sentence}</div>
                <input type="text" placeholder="Type a word from the Word Bank above" data-fb-idx="${idx}" style="width:100%; background:#0a0e1a; border:1px solid #3a4468; padding:12px; border-radius:16px;">`;
            const inputField = fbDiv.querySelector('input');
            inputField.addEventListener('input', (e) => { selectedAnswers[`partC_${idx}`] = e.target.value.trim(); });
            container.appendChild(fbDiv);
        });
    }

    function startDrillTimer() {
        if (drillTimerInterval) clearInterval(drillTimerInterval);
        drillTimerInterval = setInterval(() => {
            if (drillTime <= 0) {
                clearInterval(drillTimerInterval);
                if (!submitted) { alert("⏰ Time's up! Auto-submitting."); forceSubmitDrill(); }
            } else {
                drillTime--;
                let mins = Math.floor(drillTime / 60);
                let secs = drillTime % 60;
                document.getElementById('drillTimer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }

    function gatherAndShowSummary() {
        if (submitted) return;
        submitted = true;
        drillActive = false;
        if (drillTimerInterval) clearInterval(drillTimerInterval);
        
        let summaryHtml = `<div class="print-pattern">
            <h3>📋 ANSWER SUMMARY — ${student.name} (${student.id})</h3>
            <p><strong>Program:</strong> ${student.program} | <strong>Day:</strong> ${currentDay.toUpperCase()} | <strong>Submitted:</strong> ${new Date().toLocaleString()}</p>
            <hr>
            <h4>Part A (Questions 1-25)</h4>`;
        
        for (let i = 0; i < 25; i++) {
            let ans = selectedAnswers[`partA_${i}`] || "(not answered)";
            summaryHtml += `<div><strong>Q${i + 1}:</strong> ${ans}</div>`;
        }
        
        summaryHtml += `<hr><h4>Part B (Questions 26-40)</h4>`;
        for (let i = 0; i < 15; i++) {
            let ans = selectedAnswers[`partB_${i}`] || "(not answered)";
            summaryHtml += `<div><strong>Q${26 + i}:</strong> ${ans}</div>`;
        }
        
        summaryHtml += `<hr><h4>Part C (Questions 41-50) — Fill in the blank</h4>`;
        for (let i = 0; i < 10; i++) {
            let ans = selectedAnswers[`partC_${i}`] || "(empty)";
            summaryHtml += `<div><strong>Q${41 + i}:</strong> ${ans}</div>`;
        }
        
        summaryHtml += `<hr><footer style="margin-top:20px;">VOCAB DRILL — Official Assessment Report | Generated from secure testing platform</footer></div>`;
        document.getElementById('summaryContent').innerHTML = summaryHtml;
        summaryPopup.classList.remove('hidden');
    }

    document.getElementById('submitDrillBtn').addEventListener('click', () => {
        if (submitted) { alert("Already submitted."); return; }
        gatherAndShowSummary();
    });
    document.getElementById('closeSummaryBtn').addEventListener('click', () => summaryPopup.classList.add('hidden'));
    document.getElementById('printSummaryBtn').addEventListener('click', () => {
        const printContents = document.getElementById('summaryContent').innerHTML;
        const win = window.open();
        win.document.write(`
            <html><head><title>Vocab Drill Summary - ${student.name}</title>
            <style>
                body { font-family: 'Courier New', monospace, sans-serif; padding: 2rem; background: white; }
                .print-pattern { background: repeating-linear-gradient(45deg, #f4f6fc 0px, #f4f6fc 3px, #fff 3px, #fff 15px); padding: 20px; border-radius: 12px; }
                h3, h4 { color: #1e293b; }
                div { margin: 4px 0; }
            </style>
            </head><body>${printContents}</body></html>
        `);
        win.document.close();
        win.print();
    });
    initAntiCheat();
</script>
